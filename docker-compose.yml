services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: kim
      POSTGRES_PASSWORD: Fdmmda778778
      POSTGRES_DB: assettracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - postgres

volumes:
  postgres_data: